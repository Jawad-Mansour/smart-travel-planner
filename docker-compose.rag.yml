services:
  postgres-rag:
    image: pgvector/pgvector:pg16
    container_name: postgres-rag
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: smart_travel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_travel"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - postgres-rag-data:/var/lib/postgresql/data

  rag-runner:
    image: python:3.11-slim
    container_name: rag-runner
    working_dir: /workspace
    depends_on:
      postgres-rag:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres-rag:5432/smart_travel
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
      - rag-hf-cache:/root/.cache/huggingface
      - rag-pip-cache:/root/.cache/pip
    command: >
      bash -lc "
      python -m pip install --upgrade pip &&
      pip install
      asyncpg
      psycopg2-binary
      beautifulsoup4
      sentence-transformers
      tqdm
      httpx
      tenacity
      pydantic
      pydantic-settings
      numpy
      &&
      python backend/rag/scripts/run_rag_pipeline.py
      "

volumes:
  postgres-rag-data:
  rag-hf-cache:
  rag-pip-cache:
