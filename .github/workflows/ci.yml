name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Fast segment pacing if integration tests hit the chat stream later
      CHAT_SEGMENT_PAUSE_SEC: "0.1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -U pip && pip install -e ".[dev]"
      - name: Import check
        run: python -c "from backend.app.schemas.intent import IntentResult; print('import_ok')"
      - name: Tests
        run: pytest backend/tests -v --cov=backend/app --cov-report=term-missing --cov-fail-under=0
